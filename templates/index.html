<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Placement Analytics Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background: linear-gradient(
        135deg,
        #1e3c72,
        #2a5298
    );
    min-height:100vh;
    color:white;
}

.navbar{
    background:rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
}

.dashboard-title{
    text-align:center;
    margin-top:30px;
    margin-bottom:40px;
}

.card{
    border:none;
    border-radius:20px;
    background:rgba(255,255,255,0.15);
    backdrop-filter: blur(15px);
    color:white;
    transition:0.4s ease;
    cursor:pointer;
}

.card:hover{

    transform:
        translateY(-10px)
        scale(1.03);

    box-shadow:
        0px 15px 30px
        rgba(0,0,0,0.4);
}

.metric-value{
    font-size:2rem;
    font-weight:bold;
}

.chart-card{
    margin-top:25px;
}

.chart-card img{
    width:100%;
    border-radius:15px;
    transition:0.4s;
}

.chart-card img:hover{
    transform:scale(1.02);
}

.footer{
    text-align:center;
    margin-top:50px;
    padding:20px;
    color:#ddd;
}

</style>

</head>

<body>

<nav class="navbar navbar-expand-lg">

<div class="container">

<a class="navbar-brand text-white fw-bold" href="#">
 Placement Dashboard
</a>

</div>

</nav>

<div class="container">

<div class="dashboard-title">

<h1>
Student Placement Analytics Dashboard
</h1>

<p>
Data Analysis • Visualization • SQL • Machine Learning
</p>

</div>

<div class="row g-4">

<div class="col-md-4">

<div class="card p-4 text-center">

<h5>Total Students</h5>

<div class="metric-value">
{{ total_students }}
</div>

</div>

</div>

<div class="col-md-4">

<div class="card p-4 text-center">

<h5>Average CGPA</h5>

<div class="metric-value">
{{ avg_cgpa }}
</div>

</div>

</div>

<div class="col-md-4">

<div class="card p-4 text-center">

<h5>Placed Students</h5>

<div class="metric-value">
{{ placed_students }}
</div>

</div>

</div>

</div>

<div class="row mt-4">

<div class="col-md-6">

<div class="card chart-card p-3">

<h4 class="text-center mb-3">
CGPA Distribution
</h4>

<img
src="{{ url_for('static', filename='charts/cgpa_distribution.png') }}"
alt="CGPA Chart">

</div>

</div>

<div class="col-md-6">

<div class="card chart-card p-3">

<h4 class="text-center mb-3">
Placement Distribution
</h4>

<img
src="{{ url_for('static', filename='charts/placement_distribution.png') }}"
alt="Placement Chart">

</div>

</div>

</div>

<div class="row mt-4">

<div class="col-md-12">

<div class="card chart-card p-3">

<h4 class="text-center mb-3">
Internships vs Placement
</h4>

<img
src="{{ url_for('static', filename='charts/internships_vs_placement.png') }}"
alt="Internship Chart">

</div>

</div>

</div>

<div class="footer">


</div>

</div>

</body>

</html>
